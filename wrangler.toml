name = "founderfinder"
account_id = "cffdf44b9e5c6d35ebeac1d15fe85958"
compatibility_date = "2025-07-21"
compatibility_flags = ["nodejs_compat"]

main = ".open-next/worker.js"

[[d1_databases]]
binding = "DB"
database_name = "founderfinder"
database_id = "f224c904-145c-4b93-b3dc-aabbbba68149"

[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "founderfinder-cache"


# Add these to your existing wrangler.toml
[build]
command = "npx open-next build"
upload.format = "modules"

[define]
"require.resolve" = "undefined"
"require('util')" = "undefined"

